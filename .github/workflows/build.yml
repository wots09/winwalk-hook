name: Build V4 Realm Patcher

on:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HOMEBREW_NO_REQUIRE_TAP_TRUST: 1

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Theos
        run: |
          export THEOS=/Users/runner/theos
          echo "THEOS=/Users/runner/theos" >> $GITHUB_ENV
          git clone --depth 1 --recursive https://github.com/theos/theos.git $THEOS
          brew install ldid
      - name: Install iOS SDK
        run: |
          XCODE_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p "$THEOS/sdks"
          ditto "$XCODE_SDK" "$THEOS/sdks/iPhoneOS18.4.sdk"
      - name: Build
        run: |
          cd tweak
          export THEOS=/Users/runner/theos
          make clean
          make
          find . -name "WinwalkHook.dylib" -type f -exec cp {} ../WinwalkHook.dylib \;
          file ../WinwalkHook.dylib
      - uses: actions/upload-artifact@v5
        with:
          name: WinwalkHook_v4.dylib
          path: WinwalkHook.dylib
