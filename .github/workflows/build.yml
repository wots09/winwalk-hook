name: Build WinwalkHook Dylib

on:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HOMEBREW_NO_REQUIRE_TAP_TRUST: 1

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Install Theos
        run: |
          export THEOS=/Users/runner/theos
          echo "THEOS=/Users/runner/theos" >> $GITHUB_ENV
          git clone --depth 1 --recursive \
            https://github.com/theos/theos.git $THEOS
          brew install ldid
      
      - name: Install iOS SDK from Xcode
        run: |
          XCODE_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          test -d "$XCODE_SDK" || { echo "FATAL: SDK not found"; exit 1; }
          mkdir -p "$THEOS/sdks"
          ditto "$XCODE_SDK" "$THEOS/sdks/iPhoneOS18.4.sdk"
          echo "SDK copied: $(ls $THEOS/sdks/iPhoneOS18.4.sdk | head -3)"
      
      - name: Link fishhook (already in Theos submodules)
        run: |
          # Theos already cloned fishhook at vendor/orion/fishhook
          # Just copy the files to where Theos expects them
          cp $THEOS/vendor/orion/fishhook/fishhook.h $THEOS/include/
          cp $THEOS/vendor/orion/fishhook/fishhook.c $THEOS/lib/
          echo "fishhook installed from Theos submodule"
      
      - name: Build dylib
        run: |
          cd tweak
          export THEOS=/Users/runner/theos
          make clean
          make
      
      - name: Upload dylib artifact
        uses: actions/upload-artifact@v5
        with:
          name: WinwalkHook.dylib
          path: tweak/WinwalkHook.dylib
