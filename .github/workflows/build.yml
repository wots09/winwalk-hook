name: Build WinwalkHook Dylib

on:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HOMEBREW_NO_REQUIRE_TAP_TRUST: 1

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Install Theos
        run: |
          export THEOS=/Users/runner/theos
          echo "THEOS=/Users/runner/theos" >> $GITHUB_ENV
          git clone --depth 1 --recursive \
            https://github.com/theos/theos.git $THEOS
          brew install ldid
      
      - name: Install iOS SDK from Xcode
        run: |
          XCODE_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          SDK_DIR=$THEOS/sdks/iPhoneOS18.4.sdk
          mkdir -p $THEOS/sdks
          cp -a "$XCODE_SDK" "$SDK_DIR"
          
          MAC_SDK=$(xcrun --sdk macosx --show-sdk-path)
          mkdir -p "$SDK_DIR/System/Library/Frameworks/IOKit.framework"
          cp -a "$MAC_SDK/System/Library/Frameworks/IOKit.framework/Headers" \
            "$SDK_DIR/System/Library/Frameworks/IOKit.framework/" 2>/dev/null || true
          
          echo "SDK installed at: $SDK_DIR"
          ls "$SDK_DIR"
      
      - name: Install fishhook
        run: |
          curl -fsSL https://github.com/facebook/fishhook/archive/v0.2.tar.gz \
            -o fishhook.tar.gz
          tar xzf fishhook.tar.gz
          cp fishhook-0.2/fishhook.h $THEOS/include/
          cp fishhook-0.2/fishhook.c $THEOS/lib/
      
      - name: Build dylib
        run: |
          cd tweak
          export THEOS=/Users/runner/theos
          make clean
          make
      
      - name: Upload dylib artifact
        uses: actions/upload-artifact@v5
        with:
          name: WinwalkHook.dylib
          path: tweak/WinwalkHook.dylib
